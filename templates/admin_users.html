<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Список пользователей</title>
</head>
<body>
<h1>Список пользователей</h1>
<a href="/">Главная</a>
<ul>
    {% for u in users %}
    <li>
        {{ u[1] }} ({{ u[2] }}) - 
        <a href="{{ url_for('admin.view_user', user_id=u[0]) }}">Просмотреть</a>
    </li>
    {% endfor %}
</ul>
</body>
</html>
